# Test configuration — uses H2 in-memory DB so @DataJpaTest works in CI
# without a real PostgreSQL instance.
# Flyway is disabled because the migrations use PostgreSQL-specific syntax
# (bigserial, ::text casts, etc.) that H2 does not support.
# Hibernate creates the schema directly from entities instead.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# JWT secret — must be at least 32 chars so the app context starts
thesystem.jwt.secret=test-secret-key-for-ci-minimum-32-chars!!
