server:
  port: ${PORT:8080}

spring:
  application:
    name: the-system-api
  # Optional local overrides (real API keys / secrets) — git-ignored, loaded if present.
  config:
    import: "optional:file:./application-local.yml"
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/thesystem}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

# THE SYSTEM game config
thesystem:
  # Set to true ONLY in application-local.yml for local dev. Exposes Swagger UI
  # without auth. NEVER enable on a shipped/deployed build.
  dev-tools-enabled: ${DEV_TOOLS_ENABLED:false}
  jwt:
    # REQUIRED. Boot fails fast if this is missing, too short (< 32 bytes),
    # or left at the old public default. Generate with: openssl rand -base64 48
    secret: "${JWT_SECRET:}"
    access-expiration-ms: 86400000      # 24 hours
    refresh-expiration-ms: 604800000    # 7 days
  game:
    xp-threshold: 100                    # XP required per level
  scheduler:
    timezone: Asia/Kolkata
  ai:
    # Secrets are read from environment variables (or application-local.yml). Never commit real keys.
    groq-api-key: "${GROQ_API_KEY:}"
    gemini-api-key: "${GEMINI_API_KEY:}"
    groq-model: "${GROQ_MODEL:llama-3.3-70b-versatile}"
    gemini-model: "${GEMINI_MODEL:gemini-2.0-flash}"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.thesystem: INFO
