name: Android APK

# Builds the Capacitor Android app whenever the UI changes on main, or
# on manual dispatch. Produces downloadable debug and release APKs as workflow artifacts,
# and automatically updates the "latest" release on GitHub.

on:
  push:
    branches: [main]
    paths:
      - 'the-system-ui/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'the-system-ui/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: the-system-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: the-system-ui/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK (platforms 35 + 36, build-tools 36)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 platforms;android-36 build-tools;36.0.0'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Angular (Capacitor config)
        run: npm run build:android

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Grant gradlew execute permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: the-system-ui/android
        run: ./gradlew --no-daemon assembleDebug

      - name: Build Release APK
        working-directory: the-system-ui/android
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-system-debug-apk
          path: the-system-ui/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          
      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-system-release-unsigned-apk
          path: the-system-ui/android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

      - name: Update Latest Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          name: Latest Build
          tag_name: latest
          make_latest: true
          files: |
            the-system-ui/android/app/build/outputs/apk/debug/app-debug.apk
            the-system-ui/android/app/build/outputs/apk/release/app-release-unsigned.apk
